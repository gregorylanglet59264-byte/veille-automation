name: Infoclimat Evolution & Previsions

on:
  # schedule:
    # Lancement 5 fois par jour (8h, 12h, 16h, 20h, 23h heure francaise - configure pour l'heure d'ete UTC+2)
    # - cron: '0 6,10,14,18,21 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Mode test (envoyer uniquement a Gregory)"
        required: false
        type: boolean
        default: true
      triggered_by:
        description: "Declenche par (gregory ou patrick)"
        required: false
        type: string
        default: 'gregory'

jobs:
  run-infoclimat:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer l'analyse Infoclimat
        env:
          PYTHONUNBUFFERED: "1"
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL || 'langlet.gregory@gmail.com' }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Envoi uniquement à Gregory en test, ou configurable
          RECIPIENT_EMAILS: ${{ secrets.RECIPIENT_EMAILS || 'gregory.langlet@sfr.fr, langlet.gregory@gmail.com' }}
        run: |
          python run_infoclimat.py
