name: Infoclimat Evolution & Previsions

on:
  schedule:
    # Tous les jours à 7h UTC (9h Paris)
    - cron: '0 7 * * *'
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Mode test (envoyer uniquement a Gregory)"
        required: true
        type: boolean
        default: true

jobs:
  run-infoclimat:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer l'analyse Infoclimat
        env:
          PYTHONUNBUFFERED: "1"
          GMAIL_EMAIL: "langlet.gregory@gmail.com"
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Envoi uniquement à Gregory en test, ou configurable
          RECIPIENT_EMAILS: ${{ (github.event_name == 'schedule' || github.event.inputs.test_mode == 'false') && 'gregory.langlet@sfr.fr, langlet.gregory@gmail.com' || 'gregory.langlet@sfr.fr, langlet.gregory@gmail.com' }}
        run: |
          python run_infoclimat.py
