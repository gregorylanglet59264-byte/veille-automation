name: Vigilance Météo-France Quotidienne

on:
  schedule:
    # 7h et 17h heure française d'été (5h et 15h UTC)
    - cron: '0 5,15 * * *'
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub

jobs:
  run-vigilance:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Installer Playwright Chromium
        run: |
          playwright install chromium

      - name: Lancer la Vigilance
        env:
          SMTP_EMAIL: "gregory.langlet@sfr.fr"
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          # Destinataire(s) (séparés par des virgules si plusieurs)
          RECIPIENT_EMAILS: "patrick.marliere@wanadoo.fr"
        run: |
          python get_vigilance_data.py --out-dir output --send
