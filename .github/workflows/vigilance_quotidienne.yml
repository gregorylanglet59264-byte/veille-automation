name: Vigilance Météo-France Quotidienne

on:
  schedule:
    # 6h30 et 16h30 heure française d'été (4h30 et 14h30 UTC)
    - cron: '30 4,14 * * *'
  workflow_dispatch: # Permet de lancer manuellement depuis GitHub
    inputs:
      test_mode:
        description: "Mode test (envoyer uniquement a Gregory, pas a Patrick)"
        required: true
        type: boolean
        default: true

jobs:
  run-vigilance:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Installer Playwright Chromium
        run: |
          playwright install chromium

      - name: Lancer la Vigilance
        env:
          PYTHONUNBUFFERED: "1"
          SMTP_EMAIL: ${{ secrets.SENDER_EMAIL || 'gregory.langlet@sfr.fr' }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL || 'langlet.gregory@gmail.com' }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Envoi a Patrick uniquement en production (cron schedule ou test_mode désactivé)
          RECIPIENT_EMAILS: ${{ (github.event_name == 'schedule' || github.event.inputs.test_mode == 'false') && (secrets.RECIPIENT_EMAILS_PROD || 'gregory.langlet@sfr.fr, langlet.gregory@gmail.com, patrick.marliere@wanadoo.fr') || (secrets.RECIPIENT_EMAILS_TEST || 'gregory.langlet@sfr.fr, langlet.gregory@gmail.com') }}
        run: |
          python get_vigilance_data.py --out-dir output --send
