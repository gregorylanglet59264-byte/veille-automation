name: Veille Spécifique Intempéries & Cyclones

on:
  workflow_dispatch: # Permet le lancement manuel depuis l'interface GitHub ou les dashboards
    inputs:
      triggered_by:
        description: "Declenche par (gregory ou patrick)"
        required: false
        type: string
        default: 'gregory'

jobs:
  run-veille:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer la Veille Intempéries & Cyclones
        env:
          PYTHONUNBUFFERED: "1"
          GMAIL_EMAIL: ${{ secrets.GMAIL_EMAIL || 'langlet.gregory@gmail.com' }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Adresse e-mail du/des destinataire(s) dynamique selon le déclencheur
          RECIPIENT_EMAILS: ${{ (github.event.inputs.triggered_by == 'patrick') && (secrets.RECIPIENT_EMAILS_PROD || 'patrick.marliere@wanadoo.fr, gregory.langlet@sfr.fr, langlet.gregory@gmail.com') || (secrets.RECIPIENT_EMAILS || 'gregory.langlet@sfr.fr, langlet.gregory@gmail.com') }}
          # Clés API configurées dans les Secrets GitHub
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python run_veille_intemperies.py
