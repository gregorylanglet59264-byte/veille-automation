name: Veille Quotidienne Unifiée

on:
  schedule:
    # Lancement 5 fois par jour (8h, 12h, 16h, 20h, 23h heure francaise - configure pour l'heure d'ete UTC+2)
    - cron: '0 6,10,14,18,21 * * *'
  workflow_dispatch: # Permet de lancer le workflow manuellement depuis l'interface GitHub

jobs:
  run-veille:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer la Veille Quotidienne
        env:
          SMTP_EMAIL: "gregory.langlet@sfr.fr"
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          # Adresse e-mail du/des destinataire(s) (separees par des virgules si plusieurs)
          RECIPIENT_EMAILS: "gregory.langlet@sfr.fr"
          # Utilise au choix GEMINI_API_KEY ou OPENROUTER_API_KEY configurés dans les Secrets GitHub du dépôt
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          python run_veille.py
