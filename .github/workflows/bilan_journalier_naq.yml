name: Bilan Journalier Nouvelle-Aquitaine

on:
  schedule:
    # 18h30 heure française d'été (16h30 UTC)
    - cron: '30 16 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: "Date au format DD/MM/YYYY (laisser vide pour aujourd'hui)"
        required: false
        default: ""
      region:
        description: "Nom de la région (ex: Nouvelle-Aquitaine, Hauts-de-France...)"
        required: true
        default: "Nouvelle-Aquitaine"
      test_mode:
        description: "Mode test (envoyer uniquement à Gregory, pas à Patrick)"
        required: true
        type: boolean
        default: true

jobs:
  run-bilan:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code du dépôt
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lancer le Bilan Journalier
        env:
          PYTHONUNBUFFERED: "1"
          GMAIL_EMAIL: "langlet.gregory@gmail.com"
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          # Envoi à Patrick uniquement en production (cron schedule ou test_mode désactivé)
          RECIPIENT_EMAILS: ${{ (github.event_name == 'schedule' || github.event.inputs.test_mode == 'false') && 'gregory.langlet@sfr.fr, langlet.gregory@gmail.com, patrick.marliere@wanadoo.fr' || 'gregory.langlet@sfr.fr, langlet.gregory@gmail.com' }}
        run: |
          # Construire les arguments dynamiquement
          ARGS="--region \"${{ github.event.inputs.region || 'Nouvelle-Aquitaine' }}\" --to \"$RECIPIENT_EMAILS\" --no-nlm"
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          
          echo "Lancement: python bilan_journalier/run_bilan.py $ARGS"
          eval python bilan_journalier/run_bilan.py $ARGS
